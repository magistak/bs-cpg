name: Deploy to GitHub Pages

permissions:
  contents: write
  pages: write
  id-token: write

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      BS_CPG_DATA: /tmp/bs-cpg-data
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: "pip"
          cache-dependency-path: settings.ini

      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install dependencies and build docs
        run: |
          python -m pip install --upgrade pip
          # Pin setuptools to keep pkg_resources available for nbdev
          python -m pip install "setuptools<81"
          # Pin compatible nbdev dependency stack
          python -m pip install "fastcore<1.8" nbdev==2.3.34 execnb==0.1.11 "ipython<9"
          # Install the local package and dev dependencies
          python -m pip install -e ".[dev]"
          python -c "import pkg_resources, fastcore, nbdev, IPython; from execnb.nbio import read_nb; from IPython.utils.text import strip_ansi; print('setuptools pkg_resources ok:', pkg_resources.__file__); print('fastcore', fastcore.__version__); print('nbdev', nbdev.__version__); print('ipython', IPython.__version__)"
          # Run the documentation builder
          python -c "from nbdev.quarto import nbdev_docs; nbdev_docs()"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_docs
