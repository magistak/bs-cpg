name: Deploy to GitHub Pages

permissions:
  contents: write
  pages: write
  id-token: write

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      BS_CPG_DATA: /tmp/bs-cpg-data
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: "pip"
          cache-dependency-path: settings.ini

      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install dependencies and build docs
        run: |
          python -m pip install --upgrade pip
          # Explicitly install nbdev and execnb first
          pip install -U "nbdev<3" execnb
          # Install the local package and dev dependencies
          pip install -e ".[dev]"
          # Display where nbdev_docs went
          which nbdev_docs || echo "nbdev_docs not in PATH"
          # Run the documentation builder
          python -m nbdev.quarto

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_docs
